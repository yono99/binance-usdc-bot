agent:
  ab_shadow: false
  # false = SL fixed setelah open (no BE/trail/tighten/micro-lock). Pemilik: jangan geser SL.
  allow_move_sl: false
  autonomous: false
  autonomous_interval_s: 300
  full_auto: false
  plan_horizon_h: 6
  planner: false
  tool_loop: false
  tool_max_iters: 4
  # Risk overlay (edge hunt 2026-07-21 PROMOTE_FILTER_PAPER). NOT entry alpha.
  # shadow=true → log would-deny + stamp opens; block=true → hard skip (default OFF).
  # Paper dry: shadow ON to collect would-deny vs realized R (Jalan A). Never auto-block.
  risk_filter_shadow: true
  risk_filter_block: false
  risk_filter_breadth: true      # skip when breadth (frac > SMA50) in bottom 30% of 100d
  risk_filter_corr_vol: true     # skip when avg corr high OR BTC vol20 high (top quartile)
  # G2 quality-momentum as ENTRY signal overlay (adapted from research LS book).
  # Rules propose long/short; G2 checks quality bucket (top=long, bottom=short).
  # shadow=true → log G2_ENTRY_SHADOW when misaligned; block=true → hard skip (default OFF).
  # Goal: measure entry edge on real paper trades — NOT wire size until n evidence.
  g2_entry:
    shadow: true
    block: false
    top_q: 0.3
    lookback: 20
    snap_dir: data/snap
  # Candidate edge — owner knowledge foundation (NOT PROMOTE_PAPER).
  # Dual-track 1:1: same rules dry & live. See memory/CANDIDATE_EDGE.md + LIVE_MICRO_CHECKLIST.md
  # Owner 2026-07-21: agreed dual test dry+live with considered loss; risk_ack ON for live micro.
  cycle_candidate:
    mode: size                   # 1:1 dry+live stance (size-down long). shadow=log-only first if preferred
    allow_live: true             # LIVE may enforce (still needs risk_ack + stop ok)
    risk_ack: true               # OWNER ACK: unproven candidate; real money loss considered
    stop_loss_r_live: -5.0       # auto latch: CE-touched cum R ≤ −5 → enforce OFF until reset
    long_size_on_dump: 0.5
    long_size_on_markdown: 0.7
    long_size_on_unlock: 0.5
    soft_block_long_on_dump: true  # only applies when mode=soft_block (not in size mode)
btc:
  block_counter: true
  dump_pct: 0.5
  # SHORT conviction ×1.5 saat dump_flag — OFF: H-CYC-01/01b (2026-07-20) short-after-dump
  # bukan edge OOS. dump_flag tetap di context (prompt/audit); btc_gate counter-trend tetap ON.
  dump_short_boost: false
  enabled: true
  size_floor: 0.4
  symbol: BTC/USDC:USDC
execution:
  order_type: limit
  pending_timeout_s: 300
  post_only: true
flat_shadow:
  horizon_bars: 16
  k_atr: 1.0
  miss_threshold: 0.35
  mode: shadow
  retention_days: 90
  sample: 200
gemini:
  allow_live_trader: true
  # Frugal RPD (2026-07): chunk ≥ cap → 1 decide call/wave; hemat request = frekuensi + news + boost
  batch_chunk_size: 48
  devil_advocate:
    enabled: false
    model: ''
    veto_threshold: 0.7
  gemini_decide_cap: 24
  giveback_margin: 0.15
  giveback_tp_frac: 0.5
  min_regime_score: 0.4
  model: gemini-3-flash-preview
  news_veto: false                 # hemat ~96 req/hari (cache 15m); trade-off: tanpa veto berita
  planner_min_trades: 3
  pregate_atr_pct: 0.08
  price_cache_pct: 0.15            # 0.10→0.15: lebih banyak cache hit → skip re-decide
  role: veto
  sideways_sniper:
    budget_boost_pct: 0            # 300→0: cegah budget 48 → 2 call/wave
    devil_advocate_for_scalp: false
    enabled: true
    micro_tp_pct_max: 0.3
    micro_tp_pct_min: 0.005
    pregate_atr_pct_range: 0.003
    price_cache_pct_range: 0.05    # 0→0.05: range tak re-decide tiap tick
    require_setup_scalp_range: true
market:
  poll_seconds: 20
  quote: USDC
  settles:
  - USDC
  - USDT
  timeframe: 15m
  whitelist: []
mtf:
  mode: shadow
  mults:
  - 8
  - 16
  sample: 100
risk:
  account_risk_pct: 0.5
  corr_lookback: 50
  corr_threshold: 0.85
  # daily_max_loss_pct retired (0). Gerbang rugi utama = max_drawdown_pct (DRAWDOWN LOCK).
  daily_max_loss_pct: 0.0
  max_drawdown_pct: 20.0          # kunci entry bila equity turun ≥% dari puncak; lepas manual
  daily_max_trades: 20
  leverage: 3
  max_portfolio_exposure_pct: 30
  sl_atr_mult: 1.75
  tp_atr_mult: 2.6
  trailing: true
  trailing_atr_mult: 1.2
rotate:
  # Kebijakan pemilik: rugi = risiko yang diterima. BELAJAR dari kekalahan,
  # JANGAN menghukum pair (blacklist/cooldown karena SL). 0 = off.
  blacklist_after_sl: 0
  cooldown_minutes: 0
  max_open_positions: 6
screener:
  max_atr_pct: 6.0
  max_spread_pct: 0.03
  min_atr_pct: 0.05
  min_quote_volume_24h: 5000000
signals:
  adx_period: 14
  adx_trend_min: 25
  atr_period: 14
  ema_fast: 9
  ema_mid: 21
  ema_slow: 50
  entry_confidence: 0.30   # kalibrasi skor live paper (p90≈0.37); 0.65 ≈ 0 entry
  rsi_period: 14
  weights:
    momentum: 0.3
    structure: 0.3
    trend: 0.4
strategy:
  adx_range: 25
  adx_strong: 25
  basis_z_window: 48
  cascade_close_loc: 0.35
  cascade_vol_lookback: 20
  cascade_vol_mult: 2.0
  cleanliness:
    enabled: true
    lookback_bars: 50
    max_adx: 25
    max_atr_cv: 0.8
    max_wick_body_ratio: 3.0
  cvd_lookback: 8
  cvd_min: 0.05
  entry_ext_atr: 2.2
  entry_rsi_max: 72
  entry_rsi_min: 28
  entry_runup_atr: 2.0
  entry_runup_bars: 3
  funding_z_block: 1.5
  funding_z_window: 30
  gate_corr: true
  # Paper 2026-07: overext+runup + conf ketat ≈ 0 entry di majors sepi.
  # Matikan dulu agar RULES bisa diukur (Jalan A); nyalakan lagi setelah frekuensi sehat.
  gate_overext: false
  gate_runup: false
  htf_mult: 4
  mr_rsi_high: 70
  mr_rsi_low: 30
  oi_delta_lookback: 4
  sessions: []
vrp:
  gap_threshold: 0.1
  mode: shadow
